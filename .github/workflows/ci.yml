name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t btb-test .

      - name: Start container
        run: |
          docker run -d --name btb-test \
            -p 3001:3001 \
            -e AUTH_USERNAME=testuser \
            -e AUTH_PASSWORD=testpass \
            -e JWT_SECRET=ci-test-secret-key \
            -e ANTHROPIC_API_KEY=sk-test-not-real \
            btb-test
          sleep 5

      - name: Health check - homepage returns 200
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/)
          echo "Homepage status: $status"
          [ "$status" = "200" ]

      - name: Health check - login with bad creds returns 401
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:3001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"wrong","password":"wrong"}')
          echo "Bad login status: $status"
          [ "$status" = "401" ]

      - name: Health check - protected route without token returns 401
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/progress)
          echo "Unauthed progress status: $status"
          [ "$status" = "401" ]

      - name: Cleanup
        if: always()
        run: docker rm -f btb-test || true
